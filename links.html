<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Kleber Silva</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <style>
        .links-body {
            background-color: #1c1e21; /* Tom escuro do seu Linktree */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .links-container {
            width: 100%;
            max-width: 580px;
            text-align: center;
        }

        /* Cabeçalho que você escolheu */
        .profile-header {
            margin-bottom: 24px;
        }

        .profile-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text-light, #ffffff);
            margin-bottom: 4px;
        }

        .profile-header h1 span {
            color: #e9b33c; /* Amarelo-ouro */
        }

        .profile-header p {
            font-size: 0.95rem;
            color: var(--text-muted, rgba(250, 250, 250, 0.6));
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Linha de mini ícones sociais */
        .social-mini-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .social-mini-icon {
            font-size: 1.5rem;
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .social-mini-icon:hover {
            transform: scale(1.15);
            color: #e9b33c;
        }

        /* Grade de Botões Estilo Linktree */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .tree-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e9b33c; /* Amarelo-ouro */
            color: #1c1e21; /* Texto escuro */
            padding: 18px 24px;
            border-radius: 50px; /* Estilo pílula / arredondado */
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .tree-link:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        .tree-icon-emoji {
            font-size: 1.4rem;
            position: absolute;
            left: 24px;
        }

        .links-footer {
            font-size: 0.85rem;
            color: rgba(250, 250, 250, 0.4);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="links-body">

    <div class="links-container">
        
        <!-- CABEÇALHO ADAPTADO COM O SEU TRECHO FAVORITO -->
        <div class="profile-header">
            <div style="display: inline-block; position: relative;">
                <div style="width: 90px; height: 90px; background: var(--bg-gray, #292a2b); border: 2px solid #e9b33c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 16px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">💻</div>
            </div>
            <h1>Kleber <span>Silva</span></h1>
            <p>Dev .NET | Game Dev | Professor de TI</p>
        </div>

        <!-- MINI ÍCONES SOCIAIS 
        <div class="social-mini-row">
            <a href="https://www.instagram.com/devklebinho" target="_blank" class="social-mini-icon" title="Instagram">📸</a>
            <a href="https://bsky.app/profile/devklebinho.bsky.social" target="_blank" class="social-mini-icon" title="BlueSky">🦋</a>
            <a href="https://www.threads.net/@devklebinho" target="_blank" class="social-mini-icon" title="Threads">🧵</a>
            <a href="https://www.tiktok.com/@devklebinho" target="_blank" class="social-mini-icon" title="TikTok">🎵</a>
        </div>
        -->

        <div class="links-grid">
            
            <a href="index.html" class="tree-link">
                <span class="tree-icon-emoji">🌐</span>
                Meu Portfólio 
            </a>

            <a href="projetos.html" class="tree-link">
                <span class="tree-icon-emoji">🚀</span>
                Meus Jogos e Projetos Dev
            </a>

            <a href="https://www.youtube.com/@devklebinho" target="_blank" class="tree-link">
                <span class="tree-icon-emoji">📺</span>
                YouTube (Aulas e Dicas)
            </a>

            <a href="https://www.instagram.com/devklebinho/" target="_blank" class="tree-link">
                <span class="tree-icon-emoji">📸</span>
                Instagram
            </a>
        </div>

        <!-- FOOTER -->
        <div class="links-footer">
            <p>© 2026 klebersilva.dev.br</p>
        </div>

    </div>

</body>
</html>

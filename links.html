<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Oficiais | Kleber Silva</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .links-body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .links-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .profile-header {
            margin-bottom: 35px;
        }

        .profile-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .profile-header h1 span {
            color: var(--accent-gold);
        }

        .profile-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .tree-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-gray);
            color: var(--text-light);
            padding: 18px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            border: 1px solid rgba(233, 179, 60, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tree-link:hover {
            background-color: var(--card-hover);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .tree-link-featured {
            border: 1px solid var(--accent-gold);
            background-color: rgba(233, 179, 60, 0.03);
        }

        .tree-icon-emoji {
            font-size: 1.3rem;
            position: absolute;
            left: 24px;
        }

        .tree-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            position: absolute;
            left: 24px;
        }

        .links-footer {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="links-body">

    <div class="links-container">
        
        <div class="profile-header">
            <div style="display: inline-block; position: relative;">
                <div style="width: 90px; height: 90px; background: var(--bg-gray); border: 2px solid var(--accent-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 16px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">💻</div>
            </div>
            <h1>Kleber <span>Silva</span></h1>
            <h2 style="font-size: 1rem; color: var(--accent-gold); margin-bottom: 6px;">Dev Klebinho</h2>
            <p>Dev .NET | Game Dev | Professor de TI</p>
        </div>

        <div class="links-grid">
            
            <a href="index.html" class="tree-link tree-link-featured">
                <span class="tree-icon-emoji">🌐</span>
                Meu Portfólio
            </a>

            <a href="https://www.instagram.com/devklebinho" target="_blank" class="tree-link">
                <img src="Public/Assets/icons/social/icons8-instagram-100.png" alt="Instagram" class="tree-icon">
                Instagram
            </a>
            
            <a href="https://www.youtube.com/@devklebinho" target="_blank" class="tree-link">
                <img src="Public/Assets/icons/social/icons8-youtube-100.png" alt="YouTube" class="tree-icon">
                YouTube
            </a>

        </div>

        <div class="links-footer">
            <p>© 2026 klebersilva.dev.br</p>
        </div>

    </div>

</body>
</html>
